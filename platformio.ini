; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Target is an ESP32-C3 (RISC-V, single core). Uses the built-in USB-CDC for
; upload + serial, so no external programmer is needed -- just plug in USB.
[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

; IR transmit/receive library (provides IRremote.hpp, IrSender, sendNECRaw).
; OLED: Adafruit SSD1306 + GFX (BusIO is pulled in automatically).
lib_deps =
    z3t0/IRremote@^4.4.1
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11

; Route Serial over the native USB-CDC peripheral (so logging works on boards
; that only expose the USB-JTAG port, with no separate UART-USB bridge).
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
